name: Deploy Lambda Tool

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install deployment tools
        run: |
          python -m pip install --upgrade pip
          pip install boto3 wheel

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Prepare Lambda Function
        run: |
          set -e
          
          # Create build directory
          mkdir -p build
          
          # Copy user's tool code
          cp tool.py build/
          
          # Create lambda_function.py using echo commands
          echo "import json" > build/lambda_function.py
          echo "import inspect" >> build/lambda_function.py
          echo "import sys" >> build/lambda_function.py
          echo "import os" >> build/lambda_function.py
          echo "" >> build/lambda_function.py
          echo "# Add current directory to path to import user's tool" >> build/lambda_function.py
          echo "sys.path.insert(0, os.path.dirname(os.path.abspath(__file__)))" >> build/lambda_function.py
          echo "" >> build/lambda_function.py
          echo "# Import user's tool code" >> build/lambda_function.py
          echo "import tool" >> build/lambda_function.py
          echo "" >> build/lambda_function.py
          echo "def lambda_handler(event, context):" >> build/lambda_function.py
          echo "    try:" >> build/lambda_function.py
          echo "        body = event.get('body')" >> build/lambda_function.py
          echo "        if isinstance(body, str):" >> build/lambda_function.py
          echo "            body = json.loads(body)" >> build/lambda_function.py
          echo "" >> build/lambda_function.py
          echo "        # Find all callable functions from the tool module" >> build/lambda_function.py
          echo "        funcs = []" >> build/lambda_function.py
          echo "        for name in dir(tool):" >> build/lambda_function.py
          echo "            obj = getattr(tool, name)" >> build/lambda_function.py
          echo "            if (callable(obj) and not name.startswith('_') and hasattr(obj, '__module__') and obj.__module__ == 'tool'):" >> build/lambda_function.py
          echo "                funcs.append(obj)" >> build/lambda_function.py
          echo "" >> build/lambda_function.py
          echo "        if not funcs:" >> build/lambda_function.py
          echo "            return {'statusCode': 500, 'body': json.dumps({'error': 'No callable function found in tool'})}" >> build/lambda_function.py
          echo "" >> build/lambda_function.py
          echo "        # Use the last defined function as the main tool function" >> build/lambda_function.py
          echo "        func = funcs[-1]" >> build/lambda_function.py
          echo "        sig = inspect.signature(func)" >> build/lambda_function.py
          echo "" >> build/lambda_function.py
          echo "        # Match parameters from request body to function arguments" >> build/lambda_function.py
          echo "        args = {}" >> build/lambda_function.py
          echo "        for param_name in sig.parameters:" >> build/lambda_function.py
          echo "            if param_name in body:" >> build/lambda_function.py
          echo "                args[param_name] = body[param_name]" >> build/lambda_function.py
          echo "" >> build/lambda_function.py
          echo "        # Call the user's function" >> build/lambda_function.py
          echo "        result = func(**args)" >> build/lambda_function.py
          echo "" >> build/lambda_function.py
          echo "        return {'statusCode': 200, 'body': json.dumps(result)}" >> build/lambda_function.py
          echo "" >> build/lambda_function.py
          echo "    except Exception as e:" >> build/lambda_function.py
          echo "        import traceback" >> build/lambda_function.py
          echo "        return {'statusCode': 500, 'body': json.dumps({'error': str(e), 'traceback': traceback.format_exc()})}" >> build/lambda_function.py

      - name: Install Dependencies and Deploy
        run: |
          set -e
          
          # Use repo name as function name, sanitized
          func_name=$(echo "${{ github.repository }}" | cut -d'/' -f2 | sed 's/[^a-zA-Z0-9_-]/_/g')
          
          echo "🚀 Preparing function: $func_name"
          
          # Install dependencies if requirements.txt exists and is not empty
          if [[ -s requirements.txt ]]; then
            echo "📦 Installing dependencies for $func_name"
            pip install -r requirements.txt -t build/
          else
            echo "⚠️ No or empty requirements.txt found for $func_name"
          fi
          
          # Create zip file
          cd build
          zip -r "../${func_name}.zip" . > /dev/null
          cd ..
          
          echo "🚀 Deploying $func_name to Lambda..."
          
          # Check if function exists and update or create accordingly
          if aws lambda get-function --function-name "$func_name" > /dev/null 2>&1; then
            echo "🔄 Updating existing function $func_name"
            
            # Retry loop for update
            max_retries=5
            attempt=1
            while [ $attempt -le $max_retries ]; do
              if aws lambda update-function-code \
                  --function-name "$func_name" \
                  --zip-file fileb://"${func_name}.zip"; then
                echo "✅ Successfully updated $func_name"
                break
              else
                echo "⚠️ Update in progress or failed (attempt $attempt), retrying in 10s..."
                sleep 10
              fi
              attempt=$((attempt + 1))
            done
            
          else
            echo "🆕 Creating new function $func_name"
            aws lambda create-function \
              --function-name "$func_name" \
              --runtime python3.11 \
              --role arn:aws:iam::851725561714:role/Python_lambda \
              --handler lambda_function.lambda_handler \
              --zip-file fileb://"${func_name}.zip" \
              --timeout 60 \
              --memory-size 128 \
              --environment Variables="{ENV=prod,TOOL_SECRET=${{ secrets.TOOL_SECRET }}}" || {
                echo "❌ Failed to create function $func_name"
                exit 1
              }
          fi
          
          echo "✅ Successfully deployed $func_name"
          
          # Output the function ARN for easy access
          aws lambda get-function --function-name "$func_name" --query 'Configuration.FunctionArn'
